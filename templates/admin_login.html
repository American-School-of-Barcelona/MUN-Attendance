

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6fb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .login-container {
      background: white;
      padding: 32px;
      border-radius: 14px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      text-align: center;
    }

    .info {
      font-size: 0.95rem;
      color: #4b5563;
      margin-bottom: 20px;
      text-align: center;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #c7d2e0;
      font-size: 1rem;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1e4fc9;
    }

    .error {
      color: #b91c1c;
      margin-bottom: 12px;
      text-align: center;
      font-weight: 600;
    }

    .back {
      display: block;
      text-align: center;
      margin-top: 16px;
      text-decoration: none;
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Admin Login</h1>

    <p class="info">
      Only the host school MUN executive administrator can access the admin directory and advanced filtering tools.
    </p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <input type="password" name="password" placeholder="Enter admin password" required>
      <button type="submit">Login as Admin</button>
    </form>

    <a class="back" href="{{ url_for('index') }}">← Back to Home</a>
  </div>
</body>
</html>
